    <title>记事本</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html {
        color-scheme: light dark;
      }
      body {
        height: 100vh;
        overflow: hidden;
      }
      #note-editor {
        width: 100%;
        height: 100%;
        border: none;
        outline: none;
        resize: none;
        padding: 16px;
        font-family: system-ui, sans-serif;
        line-height: 1.5;
        white-space: pre-wrap;
        tab-size: 4;
      }
    </style>
  </head>
  <body>
    <textarea id="note-editor" autofocus></textarea>

    <script>
      const editor = document.getElementById("note-editor");
      const STORAGE_PREFIX = "note-hehu-fun-";

      // 获取当前路径
      function getPath() {
        let p = window.location.pathname;
        p = p.replace(/^\/+|\/+$/g, "");
        return p ? "/" + p : "/";
      }

      // 存储 key
      function getKey() {
        return STORAGE_PREFIX + getPath();
      }

      // 加载
      function load() {
        editor.value = localStorage.getItem(getKey()) || "";
        document.title = "记事本 " + getPath();
      }

      // 保存（防抖）
      let timer;
      function save() {
        clearTimeout(timer);
        timer = setTimeout(() => {
          localStorage.setItem(getKey(), editor.value);
        }, 500);
      }

      // Tab 缩进
      editor.addEventListener("keydown", (e) => {
        if (e.key === "Tab") {
          e.preventDefault();
          const s = editor.selectionStart;
          editor.value =
            editor.value.substring(0, s) +
            "\t" +
            editor.value.substring(editor.selectionEnd);
          editor.selectionStart = editor.selectionEnd = s + 1;
          save();
        }
      });

      // 自动保存
      editor.addEventListener("input", save);
      window.addEventListener("beforeunload", save);

      // 初始化
      load();
    </script>
  </body>
